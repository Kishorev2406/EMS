<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Login – EMS</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">
      <div class="icon">👤</div>
      <h2>User Login</h2>
      <p class="subtitle">Event Management System</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Login</button>
    </form>

    <p style="text-align:center;margin-top:1.2rem;font-size:.88rem;color:#64748b">
      Don't have an account? <a href="user-register.html" style="color:var(--primary)">Register here</a>
    </p>
    <p style="text-align:center;margin-top:.5rem;font-size:.88rem;color:#64748b">
      <a href="admin-login.html" style="color:#64748b">Admin Login →</a>
    </p>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    try {
      const res  = await fetch('/api/user/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
      });
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('userId',   data.userId);
        sessionStorage.setItem('userName', data.name);
        sessionStorage.setItem('userEmail',data.email);
        sessionStorage.setItem('userPhone',data.phone);
        sessionStorage.setItem('role',     'user');
        window.location.href = 'user-dashboard.html';
      } else {
        showAlert(data.message, 'danger');
      }
    } catch (err) {
      showAlert('Server error. Make sure the Java server is running.', 'danger');
    }
  });

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
  }
</script>
</body>
</html>
