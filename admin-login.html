<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – EMS</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="logo">
      <div class="icon">🛡️</div>
      <h2>Admin Login</h2>
      <p class="subtitle">Event Management System</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter admin username" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Login as Admin</button>
    </form>

    <p style="text-align:center;margin-top:1.2rem;font-size:.88rem;color:#64748b">
      Not an admin? <a href="user-login.html" style="color:var(--primary)">User Login</a>
    </p>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    try {
      const res  = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
      });
      const data = await res.json();

      if (data.success) {
        // Store admin session
        sessionStorage.setItem('adminId',   data.adminId);
        sessionStorage.setItem('adminName', data.username);
        sessionStorage.setItem('role',      'admin');
        window.location.href = 'admin-dashboard.html';
      } else {
        showAlert(data.message, 'danger');
      }
    } catch (err) {
      showAlert('Server error. Make sure the Java server is running.', 'danger');
    }
  });

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
  }
</script>
</body>
</html>
