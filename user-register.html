<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – EMS</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:480px">
    <div class="logo">
      <div class="icon">📝</div>
      <h2>Create Account</h2>
      <p class="subtitle">Join Event Management System</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="Enter your full name" required/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter your email" required/>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" class="form-control" placeholder="Enter 10-digit phone number"
               pattern="[0-9]{10}" required/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" minlength="6" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem">Create Account</button>
    </form>

    <p style="text-align:center;margin-top:1.2rem;font-size:.88rem;color:#64748b">
      Already have an account? <a href="user-login.html" style="color:var(--primary)">Login here</a>
    </p>
  </div>
</div>

<script>
  document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const phone    = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;

    if (password !== confirm) { showAlert('Passwords do not match!', 'danger'); return; }
    if (phone.length !== 10)  { showAlert('Phone number must be 10 digits!', 'danger'); return; }

    try {
      const res  = await fetch('/api/user/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&phone=${encodeURIComponent(phone)}&password=${encodeURIComponent(password)}`
      });
      const data = await res.json();

      if (data.success) {
        showAlert('Registration successful! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = 'user-login.html', 1800);
      } else {
        showAlert(data.message, 'danger');
      }
    } catch (err) {
      showAlert('Server error. Make sure the Java server is running.', 'danger');
    }
  });

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
  }
</script>
</body>
</html>
